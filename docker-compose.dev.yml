# 로컬 개발용 override
# 사용법: make dev
#
# prod 대비 달라지는 것:
#   - backend: 코드 볼륨 마운트 + --reload (핫리로드)
#   - frontend: pnpm dev (HMR), NEXT_PUBLIC_API_URL=localhost
#
# DB: 팀 공용 서버(163.239.77.77) — 로컬 postgres 없음
# Ollama: 호스트에서 별도 실행 (ollama serve), host.docker.internal:11434 자동 연결

services:
    # 백엔드: --reload + 전체 코드 마운트 (핫리로드)
    backend:
        build:
            # dev 전용 Dockerfile — docker CLI 설치 스킵으로 빠른 빌드
            # (admin_assistant docker 도구는 dev에서 거의 안 씀)
            context: .
            dockerfile: Dockerfile.dev
        volumes:
            - .:/app
            # admin 챗 운영 어시스턴트가 호스트 docker ps/stats 호출하기 위함.
            # ⚠️ dev 전용 — 컨테이너에서 호스트 docker 제어 가능하므로 prod에서는 사용 금지.
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            # 컨테이너 네트워크에서 Prometheus는 service name으로 접근.
            # (관측 스택이 안 떠있으면 도구가 connection refused 에러 반환 — 의도된 동작)
            - PROMETHEUS_URL=http://prometheus:9090
        command:
            [
                "uvicorn",
                "app.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--reload",
            ]
        depends_on:
            redis:
                condition: service_healthy
            ocr-service:
                condition: service_healthy

    # 프론트엔드: pnpm dev (HMR)
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev
        environment:
            - NEXT_PUBLIC_API_URL=http://localhost:8080
            - NEXT_PUBLIC_GRAFANA_URL=${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3001}
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - /app/.next
        command: ["pnpm", "dev"]
        ports:
            - "3000:3000"
