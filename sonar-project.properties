sonar.projectKey=seoganpyo
sonar.projectName=서간표
sonar.projectVersion=1.0

# SonarQube 서버 URL
sonar.host.url=http://163.239.77.77:9000

# 분석 대상 경로
sonar.sources=app,frontend/src

# 제외 경로
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/venv/**,**/.next/**,**/migrations/**

# Python 설정
sonar.python.version=3.11

# 테스트 경로
sonar.tests=tests,frontend/e2e

# 커버리지 리포트 (pytest --cov 결과)
sonar.python.coverage.reportPaths=reports/coverage.xml

# 인코딩
sonar.sourceEncoding=UTF-8
