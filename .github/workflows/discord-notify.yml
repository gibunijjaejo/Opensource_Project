name: Discord Notify

# 다른 워크플로 완료 시 conclusion에 따라 성공/실패 Discord 채널로 라우팅한다.
# GitHub 네이티브 Discord Webhook(repo Settings → Webhooks)이 한 채널로 보내는 걸
# 대체하는 용도 — 본 워크플로 활성화 후 repo Webhook에서 "Workflow runs" 이벤트는 끌 것.
#
# 필요한 GitHub Secrets:
#   DISCORD_WEBHOOK_SUCCESS — 성공 채널 Webhook URL
#   DISCORD_WEBHOOK_FAILURE — 실패 채널 Webhook URL

on:
  workflow_run:
    workflows:
      - CI
      - Security Scan
      - TODO to Issue
      - Loki LLM Digest
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    # cancelled / skipped 는 알림 노이즈 — success / failure 만 라우팅.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Discord 채널로 알림 전송
        env:
          WEBHOOK_SUCCESS: ${{ secrets.DISCORD_WEBHOOK_SUCCESS }}
          WEBHOOK_FAILURE: ${{ secrets.DISCORD_WEBHOOK_FAILURE }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          WF_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WF_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WF_URL: ${{ github.event.workflow_run.html_url }}
          WF_ACTOR: ${{ github.event.workflow_run.actor.login }}
          WF_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          if [ "$WF_CONCLUSION" = "success" ]; then
            WEBHOOK="$WEBHOOK_SUCCESS"
            COLOR=3066993        # 초록
            EMOJI="✅"
            STATUS_KO="성공"
          else
            WEBHOOK="$WEBHOOK_FAILURE"
            COLOR=15158332       # 빨강
            EMOJI="❌"
            STATUS_KO="실패"
          fi

          if [ -z "$WEBHOOK" ]; then
            echo "::warning::Webhook secret 미설정 — 알림 건너뜀 ($WF_CONCLUSION 채널)"
            exit 0
          fi

          SHORT_SHA="${WF_SHA:0:8}"

          # heredoc + jq 로 안전하게 JSON 구성 (특수문자 이스케이프 자동 처리).
          PAYLOAD=$(jq -n \
            --arg title "${EMOJI} ${WF_NAME} ${STATUS_KO}" \
            --arg url "$WF_URL" \
            --arg branch "$WF_BRANCH" \
            --arg actor "$WF_ACTOR" \
            --arg sha "$SHORT_SHA" \
            --arg repo "$REPO" \
            --argjson color "$COLOR" \
            '{
              username: "GitHub Actions",
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Branch",     value: $branch, inline: true },
                  { name: "Commit",     value: $sha, inline: true },
                  { name: "Actor",      value: $actor, inline: true }
                ]
              }]
            }')

          curl -sS -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
