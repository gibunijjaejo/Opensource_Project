name: Gemini PR Review

# @gemini 멘션 시 PR diff를 Gemini가 리뷰
# - Gemini 2.0 Flash 무료 티어 사용 (비용 0원)
# - GEMINI_API_KEY만 등록되어 있으면 동작
# - GitHub App 설치 불필요
#
# 사용법:
#   1) PR 본문에 "@gemini 리뷰해줘" 작성 (PR 생성 시 자동 발동)
#   2) PR 코멘트에 "@gemini CLAUDE.md 기준으로 리뷰" 등 자유 지시

on:
    issue_comment:
        types: [created]
    pull_request:
        types: [opened]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    gemini-review:
        if: |
            (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini')) ||
            (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '@gemini'))
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 컨텍스트 수집
              id: ctx
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  EVENT_NAME: ${{ github.event_name }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
                  PR_BODY: ${{ github.event.pull_request.body }}
                  COMMENT_BODY: ${{ github.event.comment.body }}
                  REPO: ${{ github.repository }}
              run: |
                  # PR 번호 추출 — env 변수로 받아 셸 인젝션 방지
                  if [ "$EVENT_NAME" = "pull_request" ]; then
                    PR_NUM="$PR_NUMBER"
                    # PR_BODY를 환경변수에서 안전하게 파일로
                    printf '%s' "$PR_BODY" > user_request.txt
                  else
                    if [ "$IS_PR_COMMENT" != "true" ]; then
                      echo "이슈 멘션은 미지원 — PR에 멘션해주세요"
                      exit 0
                    fi
                    PR_NUM="$ISSUE_NUMBER"
                    printf '%s' "$COMMENT_BODY" > user_request.txt
                  fi

                  echo "PR_NUM=$PR_NUM" >> $GITHUB_ENV

                  # PR diff 가져오기
                  gh pr diff "$PR_NUM" --repo "$REPO" | head -c 100000 > pr.diff
                  echo "DIFF_SIZE=$(wc -c < pr.diff)" >> $GITHUB_ENV

                  # CLAUDE.md 컨벤션
                  if [ -f CLAUDE.md ]; then
                    head -c 50000 CLAUDE.md > claude.md
                  else
                    echo "" > claude.md
                  fi

                  echo "사용자 요청 길이: $(wc -c < user_request.txt) bytes"

            - name: Gemini API 호출
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              run: |
                  if [ -z "$GEMINI_API_KEY" ]; then
                    echo "❌ GEMINI_API_KEY 미설정"
                    echo "Settings → Secrets and variables → Actions에 등록 필요"
                    exit 1
                  fi

                  DIFF_CONTENT=$(cat pr.diff)
                  CLAUDE_MD=$(cat claude.md)
                  USER_REQ=$(cat user_request.txt)

                  PROMPT="당신은 PR 리뷰어입니다. 다음 PR을 리뷰하고 한국어로 답변하세요.

                  ## 프로젝트 컨벤션 (CLAUDE.md)
                  $CLAUDE_MD

                  ## 사용자 요청
                  $USER_REQ

                  ## PR Diff
                  \`\`\`diff
                  $DIFF_CONTENT
                  \`\`\`

                  ## 리뷰 형식
                  - CLAUDE.md의 PR 리뷰 기준에 따라 CRITICAL / MAJOR / MINOR로 분류
                  - 각 이슈는 파일:라인 명시 (가능한 경우)
                  - 이슈 없으면 '이슈 없음'으로 답변
                  - 마크다운 형식, 간결하게
                  - CRITICAL 이슈가 있으면 머지 전 반드시 수정 권고"

                  # 요청 JSON 생성
                  jq -n --arg prompt "$PROMPT" '{
                    contents: [{parts: [{text: $prompt}]}],
                    generationConfig: {
                      temperature: 0.3,
                      maxOutputTokens: 4000
                    }
                  }' > request.json

                  # API 호출 (gemini-2.0-flash 무료 티어)
                  HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
                    -X POST \
                    "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
                    -H "Content-Type: application/json" \
                    -d @request.json)

                  if [ "$HTTP_CODE" != "200" ]; then
                    echo "❌ Gemini API 오류 (HTTP $HTTP_CODE)"
                    cat response.json
                    exit 1
                  fi

                  # 리뷰 텍스트 추출
                  jq -r '.candidates[0].content.parts[0].text' response.json > review.md

                  if [ ! -s review.md ] || [ "$(cat review.md)" = "null" ]; then
                    echo "❌ 응답이 비어있음"
                    cat response.json
                    exit 1
                  fi

                  echo "리뷰 길이: $(wc -c < review.md) bytes"

            - name: PR에 코멘트 작성
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  {
                    echo "## ✨ Gemini Review"
                    echo ""
                    cat review.md
                    echo ""
                    echo "---"
                    echo "_diff: ${DIFF_SIZE} bytes · Gemini 2.0 Flash · 비용 0원_"
                  } > comment.md

                  gh pr comment $PR_NUM --repo ${{ github.repository }} --body-file comment.md

            - name: 아티팩트 업로드 (디버깅용)
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: gemini-review-debug-${{ github.run_number }}
                  path: |
                      pr.diff
                      request.json
                      response.json
                      review.md
                  retention-days: 3
