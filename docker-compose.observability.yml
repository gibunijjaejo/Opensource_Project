# 관측 스택 override (옵트인)
# 사용법: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.observability.yml up
# 또는: make up-obs
#
# 평소 개발 시에는 띄우지 않는다. 1-A 트랙에서 로그/대시보드 작업 시에만 사용.

services:
    # 로그 저장소
    loki:
        image: grafana/loki:2.9.8
        container_name: seoganpyo-loki
        restart: unless-stopped
        ports:
            - "3100:3100"
        volumes:
            - ./infra/observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
            - loki_data:/loki
        command: -config.file=/etc/loki/local-config.yaml
        healthcheck:
            test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    # 컨테이너 stdout 로그 수집기
    promtail:
        image: grafana/promtail:2.9.8
        container_name: seoganpyo-promtail
        restart: unless-stopped
        volumes:
            - ./infra/observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
            - promtail_positions:/tmp
        command: -config.file=/etc/promtail/config.yml
        depends_on:
            loki:
                condition: service_healthy

    # 시각화
    grafana:
        image: grafana/grafana:10.4.2
        container_name: seoganpyo-grafana
        restart: unless-stopped
        ports:
            - "3001:3000"  # 호스트 3001 (프론트 3000과 충돌 회피)
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
            - GF_AUTH_ANONYMOUS_ENABLED=false
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_ANALYTICS_REPORTING_ENABLED=false
        volumes:
            - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./infra/observability/grafana/provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
            - grafana_data:/var/lib/grafana
        depends_on:
            loki:
                condition: service_healthy

volumes:
    loki_data:
    grafana_data:
    promtail_positions:
