# 모니터링 서버용 관측 스택 — Loki + Prometheus + Grafana
# 사용처: 모니터링 서버 (163.239.77.66)
# 사용법: docker compose -f docker-compose.observability.server.yml up -d
# 또는: make obs-server-up
#
# 외부 노출 포트:
#   - 3001 (Grafana UI)  — 외부 접근 허용
#   - 3100 (Loki push)   — 앱 서버에서만 접근 (UFW 제한 권장)
#   - 9090 (Prometheus)  — 내부용

services:
    loki:
        image: grafana/loki:2.9.8
        container_name: seoganpyo-loki
        restart: unless-stopped
        ports:
            - "3100:3100"
        volumes:
            - ./infra/observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
            - loki_data:/loki
        command: -config.file=/etc/loki/local-config.yaml
        healthcheck:
            test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    prometheus:
        image: prom/prometheus:v2.51.2
        container_name: seoganpyo-prometheus
        restart: unless-stopped
        ports:
            - "9090:9090"
        volumes:
            - ./infra/observability/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=15d
        healthcheck:
            test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5

    grafana:
        image: grafana/grafana:10.4.2
        container_name: seoganpyo-grafana
        restart: unless-stopped
        ports:
            - "3001:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_ANALYTICS_REPORTING_ENABLED=false
            - GF_SECURITY_ALLOW_EMBEDDING=true
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
        volumes:
            - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./infra/observability/grafana/provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
            - grafana_data:/var/lib/grafana
        depends_on:
            loki:
                condition: service_healthy
            prometheus:
                condition: service_healthy

volumes:
    loki_data:
    prometheus_data:
    grafana_data:
