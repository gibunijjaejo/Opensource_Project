services:
    # 인증용 임시 저장소 (Redis)
    redis:
        image: redis:alpine
        container_name: seoganpyo-redis
        restart: always
        ports:
            - "6379:6379"

    # FastAPI 백엔드
    backend:
        build: .
        container_name: seoganpyo-api
        restart: always
        ports:
            - "8000:8000"
        volumes:
            - .:/app
        env_file:
            - .env
        environment:
            - REDIS_URL=redis://redis:6379/0
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
        depends_on:
            - redis

    # Next.js 프론트엔드
    frontend:
        build:
            context: ./frontend
            args:
                - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        container_name: seoganpyo-frontend
        restart: always
        ports:
            - "3000:3000"
        depends_on:
            - backend
