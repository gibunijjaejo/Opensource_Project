services:
    # 인증용 임시 저장소 (Redis)
    redis:
        image: redis:alpine
        container_name: seoganpyo-redis
        restart: always
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Mistral Pixtral OCR 마이크로서비스 (이미지 → 강의명 추출)
    ocr-service:
        build:
            context: ./ocr-service
        container_name: seoganpyo-ocr
        restart: always
        ports:
            - "8001:8000"
        environment:
            - MISTRAL_API_KEY=${MISTRAL_API_KEY}
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    # FastAPI 백엔드
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: seoganpyo-api
        restart: always
        ports:
            - "8080:8000"
        volumes:
            - ./data:/app/data
            - ./static:/app/static
            # admin 챗 운영 어시스턴트가 docker ps/stats를 호출 가능하도록 호스트 소켓 마운트.
            # ⚠️ 단일 호스트 시연 환경 전용 — 컨테이너에서 호스트 docker 제어 가능.
            - /var/run/docker.sock:/var/run/docker.sock
        env_file:
            - .env
        environment:
            - REDIS_URL=redis://redis:6379/0
            - OCR_SERVICE_URL=http://ocr-service:8000
            # Prometheus URL — .env에서 override 가능.
            # 디폴트: 같은 호스트에 make up-obs로 띄운 prometheus (docker network).
            # 외부 모니터링 서버 사용 시 .env에 PROMETHEUS_URL=http://<IP>:9090 설정.
            - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
            # DefectDojo 보안 대시보드 — 관리자 페이지의 보안 모니터링이 호출.
            # 토큰은 .env 또는 Jenkins Credentials에서 주입 (절대 하드코딩 금지).
            - DEFECTDOJO_URL=${DEFECTDOJO_URL:-http://163.239.77.65:8888}
            - DEFECTDOJO_TOKEN=${DEFECTDOJO_TOKEN:-}
            - DEFECTDOJO_ENGAGEMENT=${DEFECTDOJO_ENGAGEMENT:-1}
        command:
            [
                "uvicorn",
                "app.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
            ]
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            redis:
                condition: service_healthy
            ocr-service:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    # Next.js 프론트엔드
    frontend:
        build:
            context: ./frontend
            args:
                - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
                - NEXT_PUBLIC_GRAFANA_URL=${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3001}
        container_name: seoganpyo-frontend
        restart: always
        ports:
            - "3000:3000"
        depends_on:
            backend:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
