services:
    # 인증용 임시 저장소 (Redis)
    redis:
        image: redis:alpine
        container_name: seoganpyo-redis
        restart: always
        ports:
            - "6379:6379"

    # PaddleOCR 마이크로서비스 (이미지 → 텍스트 블록)
    ocr-service:
        build:
            context: ./ocr-service
        container_name: seoganpyo-ocr
        restart: always
        ports:
            - "8001:8000"
        volumes:
            - paddle_model_cache:/root/.paddleocr

    # FastAPI 백엔드
    backend:
        build: .
        container_name: seoganpyo-api
        restart: always
        ports:
            - "8080:8000"
        volumes:
            - .:/app
        env_file:
            - .env
        environment:
            - REDIS_URL=redis://redis:6379/0
            - OCR_SERVICE_URL=http://ocr-service:8000
        command:
            [
                "uvicorn",
                "app.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--reload",
            ]
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            - redis
            - ocr-service

    # Next.js 프론트엔드
    frontend:
        build:
            context: ./frontend
            args:
                - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        container_name: seoganpyo-frontend
        restart: always
        ports:
            - "3000:3000"
        depends_on:
            - backend

    # 코드 품질 분석 (SonarQube)
    sonarqube:
        image: sonarqube:community
        container_name: seoganpyo-sonar
        restart: always
        ports:
            - "9000:9000"
        environment:
            - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
        volumes:
            - sonar_data:/opt/sonarqube/data
            - sonar_logs:/opt/sonarqube/logs
            - sonar_extensions:/opt/sonarqube/extensions

volumes:
    paddle_model_cache:
    sonar_data:
    sonar_logs:
    sonar_extensions:
