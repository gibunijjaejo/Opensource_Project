version: '3.8'

services:
  db:
    image: postgres:15
    container_name: seoganpyo-db
    restart: always
    environment:
      POSTGRES_USER: minji        # 민지님 이름으로 사용자 설정
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: seoganpyo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: seoganpyo-api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    environment:
      DATABASE_URL: postgresql://minji:password123@db:5432/seoganpyo_db
    depends_on:
      - db

volumes:
  postgres_data: